<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/output.css">
    <title>Document</title>
</head>

<body class="flex justify-center items-center h-lvh">
    <main class="w-96 font-display">
        <section class="bg-linear-to-b from-(--light-slate-blue) from-5% via-(--light-royal-blue)-30% via-80% to-(--light-royal-blue) flex flex-col items-center pt-5 pb-7 px-12">
            <p class="text-light-lavender text-[18px]">Your result</p>
            <div class="bg-linear-to-b from bg-(--violet-blue) via-10% to-(--persian-blue) rounded-full w-40 h-40 flex flex-col justify-center items-center">
                <h1 class="text-center text-white text-6xl font-bold mb-2">76</h1>
                <p class="text-light-lavender/65 text-center text-[18px]">of 100</>
            </div>
            <h2 class="text-white text-2xl font-medium">Great</h2>
            <p class="text-light-lavender w-3xs">You scored higher than 65% of the people who have taken these tests.</p>
        </section>
        <h3>Summary</h3>
        <div class="flex justify-between items-center">
            <ul class="flex justify-center">
                <li><img src="./results-summary-component-main/assets/images/icon-reaction.svg" alt="reaction vector graphic"></li>
                <li>Reaction</li>
            </ul>
            <ul class="flex justify-center">
                <li>80</li>
                <li><span>/</span></li>
                <li>100</li>
            </ul>
        </div>
        <div class="flex justify-between items-center">
            <ul class="flex justify-center">
                <li><img src="./results-summary-component-main/assets/images/icon-memory.svg" alt="memory vector graphic"></li>
                <li>Memory</li>
            </ul>
            <ul class="flex justify-center">
                <li>92</li>
                <li><span>/</span></li>
                <li>100</li>
            </ul>
        </div>
        <div class="flex justify-between items-center">
            <ul class="flex justify-center">
                <li><img src="./results-summary-component-main/assets/images/icon-verbal.svg" alt="verbal vector graphic"></li>
                <li>Verbal</li>
            </ul>
            <ul class="flex justify-center">
                <li>61</li>
                <li><span>/</span></li>
                <li>100</li>
            </ul>
        </div>
        <div class="flex justify-between items-center">
            <ul class="flex justify-center">
                <li><img src="./results-summary-component-main/assets/images/icon-visual.svg" alt="visual vector graphic"></li>
                <li>Visual</li>
            </ul>
            <ul class="flex justify-center">
                <li>73</li>
                <li><span>/</span></li>
                <li>100</li>
            </ul>
        </div>
        <button class="bg-cobalt-blue">Continue</button>
    </main>
</body>

</html>
