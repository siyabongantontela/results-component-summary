<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/output.css">
    <title>Document</title>
</head>

<body>
    <main>
        <section>

            <div>
                <h1>76</h1>

            </div>

        </section>
        <h3>Summary</h3>
        <div>
            <ul>
                <li><img src="./results-summary-component-main/assets/images/icon-reaction.svg" alt="reaction vector graphic"></li>
                <li>Reaction</li>
            </ul>
            <ul>
                <li>80</li>
                <li><span>/</span></li>
                <li>100</li>
            </ul>
        </div>
        <div>
            <ul>
                <li><img src="./results-summary-component-main/assets/images/icon-memory.svg" alt="memory vector graphic"></li>
                <li>Memory</li>
            </ul>
            <ul>
                <li>92</li>
                <li><span>/</span></li>
                <li>100</li>
            </ul>
        </div>
        <div>
            <ul>
                <li><img src="./results-summary-component-main/assets/images/icon-verbal.svg" alt="verbal vector graphic"></li>
                <li>Verbal</li>
            </ul>
            <ul>
                <li>61</li>
                <li><span>/</span></li>
                <li>100</li>
            </ul>
        </div>
        <div>
            <ul>
                <li><img src="./results-summary-component-main/assets/images/icon-visual.svg" alt="visual vector graphic"></li>
                <li>Visual</li>
            </ul>
            <ul>
                <li>73</li>
                <li><span>/</span></li>
                <li>100</li>
            </ul>

</html>
